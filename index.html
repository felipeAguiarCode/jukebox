<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jazzify — Blues & Jazz</title>
  <link rel="icon" href="src/assets/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="src/css/main.css">
</head>

<body>
  <div class="app" data-screen="home">
    <header class="header">
      <div class="header__text">
        <h1 class="header__title">Jazzify</h1>
        <p class="header__greeting">Hello, music lover 👋</p>
      </div>
    </header>

    <main class="main" role="main">
      <section class="screen screen--home screen--active" data-screen-id="home">
        <section class="moods moods--trending" aria-labelledby="trending-heading">
          <h2 class="moods__heading" id="trending-heading">Main Categories</h2>
          <div class="moods__carousel moods__carousel--cards" role="list">
            <!-- Populated by JS -->
          </div>
        </section>
        <div class="moods-sections" id="mood-sections">
          <!-- Populated by JS from MOOD_SECTIONS -->
        </div>
      </section>

      <section class="screen screen--playlist" data-screen-id="playlist" hidden>
        <header class="playlist-header">
          <button class="playlist-header__back" type="button" data-action="back" aria-label="Voltar">
            <svg class="playlist-header__icon" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
          </button>
          <h2 class="playlist-header__title" data-mood-name></h2>
          <button class="playlist-header__sort" type="button" data-action="playlist-sort" aria-label="Ordenar"
            title="Ordenar">
            <span class="playlist-header__sort-label" data-playlist-sort-label>A-Z</span>
            <svg class="playlist-header__sort-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="m7 15 5 5 5-5M7 9l5-5 5 5" />
            </svg>
          </button>
        </header>
        <ul class="track-list" role="list">
          <!-- Populated by JS -->
        </ul>
      </section>

      <section class="screen screen--search" data-screen-id="search" hidden>
        <header class="search-header">
          <button class="search-header__back" type="button" data-action="back" aria-label="Voltar">
            <svg class="search-header__icon" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
          </button>
          <input class="search-header__input" type="search" placeholder="Search vibe..." autocomplete="off"
            data-search-input aria-label="Buscar">
          <button class="search-header__sort" type="button" data-action="search-sort" aria-label="Ordenar"
            title="Ordenar">
            <span class="search-header__sort-label" data-search-sort-label>A-Z</span>
            <svg class="search-header__sort-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="m7 15 5 5 5-5M7 9l5-5 5 5" />
            </svg>
          </button>
        </header>
        <span class="search-header__count" data-search-count></span>
        <ul class="track-list track-list--search" role="list" data-search-list>
          <!-- Populated by JS -->
        </ul>
      </section>

      <section class="screen screen--queue" data-screen-id="queue" hidden>
        <header class="queue-header">
          <button class="queue-header__back" type="button" data-action="back" aria-label="Voltar">
            <svg class="queue-header__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" aria-hidden="true">
              <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
          </button>
          <h2 class="queue-header__title">Queue</h2>
          <button class="queue-header__play-all" type="button" data-action="queue-play-all"
            aria-label="Reproduzir todas">Play All</button>
          <button class="queue-header__reset" type="button" data-action="queue-reset"
            aria-label="Limpar fila">Reset</button>
        </header>
        <ul class="track-list track-list--queue" role="list" data-queue-list>
          <!-- Populated by JS -->
        </ul>
      </section>

      <section class="screen screen--playing" data-screen-id="playing" hidden>
        <header class="playing-header">
          <button class="playing-header__back" type="button" data-action="back" aria-label="Voltar">
            <svg class="playing-header__icon" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
          </button>
          <h2 class="playing-header__title">Now Playing</h2>
          <a class="playing-header__youtube-link" href="#" target="_blank" rel="noopener noreferrer"
            data-player-youtube-link aria-label="Ouvir no YouTube">Listen on YouTube</a>
        </header>
        <div class="player">
          <div class="player__artwork" data-player-artwork>
            <div class="player__artwork-record">
              <img src="" alt="" class="player__artwork-img" width="200" height="200">
              <div class="player__artwork-grooves" aria-hidden="true"></div>
              <div class="player__artwork-center" aria-hidden="true"></div>
            </div>
            <div class="player__artwork-needle" aria-hidden="true">
              <svg class="player__artwork-needle-svg" viewBox="0 0 100 16" fill="none" stroke="currentColor"
                stroke-width="1.5">
                <path d="M5 8 L90 8" stroke-linecap="round" />
                <circle cx="95" cy="8" r="5" fill="currentColor" />
                <circle cx="5" cy="8" r="3" fill="currentColor" />
              </svg>
            </div>
          </div>
          <div class="player__info">
            <h3 class="player__track" data-player-track>
              <span class="player__track-inner"></span>
            </h3>
            <p class="player__meta">
              <a class="player__channel-link" data-player-channel href="#" target="_blank" rel="noopener noreferrer"
                tabindex="-1"></a>
            </p>
          </div>
          <div class="player__progress">
            <span class="player__time player__time--current" data-player-current>0:00</span>
            <div class="player__bar" role="slider" tabindex="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
              data-player-bar>
              <div class="player__bar-fill" data-player-bar-fill></div>
              <div class="player__bar-thumb" data-player-bar-thumb></div>
            </div>
            <span class="player__time player__time--total" data-player-total>0:00</span>
          </div>
          <div class="player__controls">
            <button class="player__btn player__btn--rewind" type="button" aria-label="Retroceder 10 segundos"
              data-action="rewind-10">
              <span class="player__btn-10">10</span>
              <svg class="player__icon-rewind" width="28" height="28" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                aria-hidden="true">
                <path d="M21 12a9 9 0 0 0-9-9 9 9 0 0 0-9 9" />
                <path d="M3 12v-4l4 4-4 4v-4" />
              </svg>
            </button>
            <button class="player__btn player__btn--prev" type="button" aria-label="Faixa anterior" data-action="prev">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
              </svg>
            </button>
            <button class="player__btn player__btn--play" type="button" aria-label="Play/Pause"
              data-action="play-pause">
              <svg class="player__icon-play" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"
                aria-hidden="true">
                <path d="M8 5v14l11-7z" />
              </svg>
              <svg class="player__icon-pause" width="32" height="32" viewBox="0 0 24 24" aria-hidden="true" hidden>
                <rect x="5" y="4" width="5" height="16" fill="white" />
                <rect x="14" y="4" width="5" height="16" fill="white" />
              </svg>
            </button>
            <button class="player__btn player__btn--next" type="button" aria-label="Próxima faixa" data-action="next">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M6 18l8.5-6L6 6v12zm2-6l4.5 3V9L8 12zm9-9v14h2V3h-2z" />
              </svg>
            </button>
            <button class="player__btn player__btn--forward" type="button" aria-label="Avançar 10 segundos"
              data-action="forward-10">
              <span class="player__btn-10">10</span>
              <svg class="player__icon-forward" width="28" height="28" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                aria-hidden="true">
                <path d="M3 12a9 9 0 0 1 9-9 9 9 0 0 1 9 9" />
                <path d="M21 12v-4l-4 4 4 4v-4" />
              </svg>
            </button>
          </div>
        </div>
        <div id="youtube-player" class="youtube-player" aria-hidden="true"></div>
      </section>
    </main>

    <div class="now-playing-bar" id="now-playing-bar" role="region" aria-label="Reproduzindo" aria-hidden="true" hidden>
      <div class="now-playing-bar__content">
        <span class="now-playing-bar__track" data-now-playing-track></span>
        <div class="now-playing-bar__controls">
          <button class="now-playing-bar__btn" type="button" aria-label="Retroceder 10 segundos"
            data-action="mini-rewind-10">
            <span class="now-playing-bar__btn-10">10</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12a9 9 0 0 0-9-9 9 9 0 0 0-9 9" />
              <path d="M3 12v-4l4 4-4 4v-4" />
            </svg>
          </button>
          <button class="now-playing-bar__btn" type="button" aria-label="Faixa anterior" data-action="mini-prev">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
            </svg>
          </button>
          <button class="now-playing-bar__btn now-playing-bar__btn--play" type="button" aria-label="Play/Pause"
            data-action="mini-play-pause">
            <svg class="now-playing-bar__icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"
              aria-hidden="true">
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg class="now-playing-bar__icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"
              aria-hidden="true" hidden>
              <rect x="5" y="4" width="5" height="16" fill="currentColor" />
              <rect x="14" y="4" width="5" height="16" fill="currentColor" />
            </svg>
          </button>
          <button class="now-playing-bar__btn" type="button" aria-label="Próxima faixa" data-action="mini-next">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M6 18l8.5-6L6 6v12zm2-6l4.5 3V9L8 12zm9-9v14h2V3h-2z" />
            </svg>
          </button>
          <button class="now-playing-bar__btn" type="button" aria-label="Avançar 10 segundos"
            data-action="mini-forward-10">
            <span class="now-playing-bar__btn-10">10</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 12a9 9 0 0 1 9-9 9 9 0 0 1 9 9" />
              <path d="M21 12v-4l-4 4 4 4v-4" />
            </svg>
          </button>
          <button class="now-playing-bar__btn now-playing-bar__btn--stop" type="button" aria-label="Parar música"
            data-action="mini-stop">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <nav class="nav" role="navigation" aria-label="Principal">
      <a class="nav__link nav__link--active" href="#home" data-nav="home" aria-current="page">
        <svg class="nav__icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
        </svg>
        <span class="nav__label">Home</span>
      </a>
      <a class="nav__link" href="#search" data-nav="search">
        <svg class="nav__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        <span class="nav__label">Search</span>
      </a>
      <a class="nav__link" href="#queue" data-nav="queue">
        <svg class="nav__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 6h16M4 12h16M4 18h10" />
        </svg>
        <span class="nav__label">Queue</span>
      </a>
      <a class="nav__link" href="https://github.com/felipeAguiarCode" target="_blank" rel="noopener noreferrer"
        aria-label="Creator">
        <svg class="nav__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" aria-hidden="true">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span class="nav__label">Creator</span>
      </a>
    </nav>
  </div>

  <script src="src/js/constants.js"></script>
  <script src="src/js/toast.js"></script>
  <script src="src/js/youtube-client.js"></script>
  <script src="src/js/player.js"></script>
  <script src="src/js/now-playing-bar.js"></script>
  <script src="src/js/home.js"></script>
  <script src="src/js/playlist.js"></script>
  <script src="src/js/search.js"></script>
  <script src="src/js/queue.js"></script>
  <script src="src/js/playing.js"></script>
  <script src="src/js/app.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
</body>

</html>
